<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuna Atelier</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #faf8f6;
  color: #222;
}

.container {
  max-width: 480px;
  margin: auto;
  padding: 40px 20px;
  text-align: center;
}

h1 {
  font-size: 28px;
  letter-spacing: 2px;
  margin-bottom: 10px;
}

.subtitle {
  font-size: 14px;
  color: #888;
  margin-bottom: 40px;
}

.hero {
  width: 100%;
  height: 260px;
  background: #ddd url('https://images.unsplash.com/photo-1556228720-195a672e8a03?q=80&w=800') center/cover no-repeat;
  border-radius: 16px;
  margin-bottom: 30px;
}

.text {
  font-size: 16px;
  line-height: 1.6;
  margin-bottom: 30px;
}

.highlight {
  font-weight: bold;
}

.button {
  display: block;
  background: #111;
  color: white;
  text-decoration: none;
  padding: 16px;
  border-radius: 12px;
  font-size: 16px;
  margin-bottom: 12px;
}

.sub-btn {
  font-size: 13px;
  color: #666;
}

.footer {
  margin-top: 50px;
  font-size: 12px;
  color: #aaa;
}
</style>
</head>

<body>
<div class="container">

  <div class="subtitle">유나 아뜰리에</div>
  
  <div class="hero"></div>

    1:1 맞춤 케어로 확실한 변화를 경험하세요.
  </div>
  
  <a href="#" class="button">
    예약하기 준비중
  </a>

  <div class="sub-btn">
    카카오톡으로 간편 예약 가능
  </div>

  <div class="footer">
    © Yuna Atelier
  </div>

</div>

</body>
</html>
